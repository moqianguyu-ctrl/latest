<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的导航 - 上网从这里开始</title>
  <style>
    body { font-family: sans-serif; background: #f8f9fa; margin: 0; padding: 20px; }
    h1 { text-align: center; color: #333; }
    .search { max-width: 600px; margin: 30px auto; }
    input { width: 80%; padding: 12px; font-size: 16px; }
    button { padding: 12px 20px; background: #0066cc; color: white; border: none; cursor: pointer; }
    .section { margin: 40px 0; }
    .section h2 { color: #0066cc; border-bottom: 2px solid #0066cc; padding-bottom: 8px; }
    ul { list-style: none; padding: 0; display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
    li a { display: block; padding: 12px; background: white; border-radius: 8px; text-align: center; text-decoration: none; color: #333; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
    li a:hover { background: #e6f2ff; }
  </style>
</head>
<body>
  <h1>我的导航</h1>

  <div class="search">
    <form action="https://www.baidu.com/s" method="get" target="_blank">
      <input type="text" name="wd" placeholder="百度搜索...">
      <button type="submit">搜</button>
    </form>
  </div>

  <div class="section">
    <h2>热门网站</h2>
    <ul>
      <li><a href="https://www.baidu.com" target="_blank">百度</a></li>
      <li><a href="https://www.google.com" target="_blank">Google</a></li>
      <li><a href="https://www.taobao.com" target="_blank">淘宝</a></li>
      <li><a href="https://www.jd.com" target="_blank">京东</a></li>
      <li><a href="https://www.bilibili.com" target="_blank">B站</a></li>
      <li><a href="https://v.qq.com" target="_blank">腾讯视频</a></li>
    </ul>
  </div>

  <!-- 加更多分类自己复制上面 ul 块改标题和链接 -->

  <p style="text-align:center; color:#777;">我的导航页 · 2026</p>
</body>
</html>
